<style>
  /* ═══════════════════════════════════════════════════════════════════
     CSS VARIABLES & RESET
     ═══════════════════════════════════════════════════════════════════ */
  :root {
    --bg:           #0b0c10;
    --cyan:         #00c8ff;
    --cyan-dim:     rgba(0,200,255,0.5);
    --cyan-glow:    rgba(0,200,255,0.25);
    --orange:       #ff6b35;
    --orange-dim:   rgba(255,107,53,0.5);
    --orange-glow:  rgba(255,107,53,0.25);
    --red:          #ff3c3c;
    --red-dim:      rgba(255,60,60,0.5);
    --white-high:   rgba(255,255,255,0.85);
    --white-mid:    rgba(255,255,255,0.4);
    --white-low:    rgba(255,255,255,0.12);
    --font-display: 'Orbitron', monospace;
    --font-body:    'Rajdhani', sans-serif;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    touch-action: manipulation;
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* ═══════════════════════════════════════════════════════════════════
     BACKGROUND — subtle tech grid
     ═══════════════════════════════════════════════════════════════════ */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      linear-gradient(rgba(0,200,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ═══════════════════════════════════════════════════════════════════
     APP SHELL — flex column filling viewport
     ═══════════════════════════════════════════════════════════════════ */
  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    position: relative;
    z-index: 1;
  }

  /* ═══════════════════════════════════════════════════════════════════
     HEADER
     ═══════════════════════════════════════════════════════════════════ */
  .header {
    text-align: center;
    padding: 12px 0 6px;
    flex-shrink: 0;
  }

  .header h1 {
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--cyan-dim);
    font-weight: 400;
  }

  /* ═══════════════════════════════════════════════════════════════════
     MAIN DISPLAY — two panels side by side
     ═══════════════════════════════════════════════════════════════════ */
  .main {
    flex: 1;
    display: flex;
    flex-direction: row;
    position: relative;
    min-height: 0;
  }

  /* Vertical center divider */
  .divider {
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(
      to bottom,
      transparent,
      rgba(0,200,255,0.12) 15%,
      rgba(0,200,255,0.35) 50%,
      rgba(0,200,255,0.12) 85%,
      transparent
    );
    z-index: 5;
    transform: translateX(-50%);
  }

  .divider::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 8px;
    height: 8px;
    background: rgba(0,200,255,0.5);
    border-radius: 50%;
    box-shadow: 0 0 12px rgba(0,200,255,0.3);
  }

  /* Side panels */
  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px;
    position: relative;
  }

  .panel-label {
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--white-mid);
    position: absolute;
    top: 12px;
    left: 0;
    right: 0;
    text-align: center;
  }

  /* ═══════════════════════════════════════════════════════════════════
     NUMBER DISPLAYS
     ═══════════════════════════════════════════════════════════════════ */
  .number-display {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(80px, 22vw, 140px);
    line-height: 1;
    text-align: center;
    min-width: 2ch;
    transition: color 0.2s;
  }

  .panel-left .number-display {
    color: var(--cyan);
    text-shadow: 0 0 30px var(--cyan-glow), 0 0 60px rgba(0,200,255,0.08);
  }

  .panel-right .number-display {
    color: var(--orange);
    text-shadow: 0 0 30px var(--orange-glow), 0 0 60px rgba(255,107,53,0.08);
  }

  /* Scale-pulse animation on value change */
  .number-display.flash {
    animation: numFlash 0.15s ease-out;
  }

  @keyframes numFlash {
    0%   { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  /* EX badge beneath the level number */
  .ex-badge {
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 2px;
    color: rgba(0,200,255,0.4);
    margin-top: 4px;
    height: 18px;
  }

  /* Spacer beneath the resource number (keeps layout symmetric) */
  .resource-sub {
    margin-top: 4px;
    height: 18px;
  }

  /* ═══════════════════════════════════════════════════════════════════
     CONTROLS — button grid at bottom of screen
     ═══════════════════════════════════════════════════════════════════ */
  .controls {
    flex-shrink: 0;
    padding: 10px 12px 6px;
    display: flex;
    gap: 8px;
  }

  .control-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .btn-row {
    display: flex;
    gap: 6px;
  }

  /* Base button style */
  .btn {
    flex: 1;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 1px;
    border: none;
    border-radius: 6px;
    padding: 14px 6px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    -webkit-user-select: none;
    user-select: none;
  }

  .btn:active {
    transform: scale(0.95);
  }

  /* ── Left buttons (cyan theme) ────────────────────────────────── */
  .btn-level-plus {
    background: rgba(0,200,255,0.15);
    color: var(--cyan);
    border: 1px solid rgba(0,200,255,0.25);
  }
  .btn-level-plus:active { background: rgba(0,200,255,0.3); }

  .btn-level-minus {
    background: rgba(0,200,255,0.08);
    color: rgba(0,200,255,0.7);
    border: 1px solid rgba(0,200,255,0.12);
  }
  .btn-level-minus:active { background: rgba(0,200,255,0.2); }

  .btn-ex {
    background: rgba(0,200,255,0.06);
    color: rgba(0,200,255,0.6);
    border: 1px solid rgba(0,200,255,0.1);
    font-size: 13px;
  }
  .btn-ex:active { background: rgba(0,200,255,0.18); }

  /* ── Right buttons (orange theme) ─────────────────────────────── */
  .btn-res-plus {
    background: rgba(255,107,53,0.15);
    color: var(--orange);
    border: 1px solid rgba(255,107,53,0.25);
  }
  .btn-res-plus:active { background: rgba(255,107,53,0.3); }

  .btn-res-minus {
    background: rgba(255,107,53,0.08);
    color: rgba(255,107,53,0.7);
    border: 1px solid rgba(255,107,53,0.12);
  }
  .btn-res-minus:active { background: rgba(255,107,53,0.2); }

  .btn-activate {
    background: linear-gradient(135deg, rgba(255,107,53,0.2), rgba(255,60,60,0.2));
    color: var(--orange);
    border: 1px solid rgba(255,107,53,0.3);
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .btn-activate:active {
    background: linear-gradient(135deg, rgba(255,107,53,0.35), rgba(255,60,60,0.35));
  }

  /* ═══════════════════════════════════════════════════════════════════
     RESET BUTTON
     ═══════════════════════════════════════════════════════════════════ */
  .reset-bar {
    flex-shrink: 0;
    padding: 0 12px 10px;
  }

  .btn-reset {
    display: block;
    width: 100%;
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: rgba(255,60,60,0.08);
    border: 1px solid rgba(255,60,60,0.2);
    color: rgba(255,60,60,0.6);
    padding: 14px 20px;
    border-radius: 6px;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  .btn-reset:active {
    background: rgba(255,60,60,0.2);
    color: rgba(255,80,80,0.9);
  }

  /* ═══════════════════════════════════════════════════════════════════
     CONFIRMATION MODAL OVERLAY
     ═══════════════════════════════════════════════════════════════════ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
  }

  .modal-box {
    background: #16161f;
    border: 1px solid rgba(255,60,60,0.3);
    border-radius: 12px;
    padding: 28px 24px;
    text-align: center;
    width: 280px;
    box-shadow: 0 0 60px rgba(255,60,60,0.08);
  }

  .modal-box p {
    font-family: var(--font-body);
    font-size: 18px;
    font-weight: 500;
    color: var(--white-high);
    margin-bottom: 20px;
  }

  .modal-buttons {
    display: flex;
    gap: 10px;
  }

  .modal-confirm {
    flex: 1;
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: rgba(255,60,60,0.3);
    border: 1px solid rgba(255,60,60,0.6);
    color: #ff5555;
    padding: 14px 12px;
    border-radius: 6px;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  .modal-confirm:active { background: rgba(255,60,60,0.5); }

  .modal-cancel {
    flex: 1;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    color: var(--white-high);
    padding: 14px 12px;
    border-radius: 6px;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  .modal-cancel:active { background: rgba(255,255,255,0.2); }

  /* Safe-area bottom padding for notched phones */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .reset-bar {
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
    }
  }
</style>
